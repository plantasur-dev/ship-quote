openapi: 3.0.3
info:
  title: Ship Quote API
  version: 2.0.0
  description: API para gestión de agencias, ubicaciones, pallets, zonas y comparación de tarifas.
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor local (desarrollo)
paths:
  /agencies:
    post:
      summary: Crear una nueva agencia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgencyCreate'
      responses:
        '201':
          description: Agencia creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agency'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      summary: Listar agencias
      responses:
        '200':
          description: Lista de agencias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agency'
        '500':
          $ref: '#/components/responses/InternalError'
  /agencies/{agencyId}:
    patch:
      summary: Alternar estado `active` de una agencia
      parameters:
        - in: path
          name: agencyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agencia actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agency'
        '404':
          $ref: '#/components/responses/NotFound'
  /locations:
    post:
      summary: Crear una ubicación / provincia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreate'
      responses:
        '201':
          description: Ubicación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
  /locations/countries:
    get:
      summary: Listar países disponibles
      parameters:
        - in: query
          name: lang
          schema:
            type: string
            enum: [US, ES, IT, FR]
          description: Idioma para nombres de países (default ES)
      responses:
        '200':
          description: Array de países
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    countryCode:
                      type: string
                    countryName:
                      type: string
  /locations/provinces:
    get:
      summary: Listar provincias
      parameters:
        - in: query
          name: countryCode
          schema:
            type: string
          description: Filtrar por código de país (ISO-2)
      responses:
        '200':
          description: Lista de provincias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
  /locations/provincesByPostalCode/{postalCode}:
    get:
      summary: Obtener provincia por código postal
      parameters:
        - in: path
          name: postalCode
          required: true
          schema:
            type: string
          description: Código postal (ej. 28001)
      responses:
        '200':
          description: Provincia asociada al código postal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          $ref: '#/components/responses/NotFound'
  /pallets:
    post:
      summary: Crear tipo de pallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PalletCreate'
      responses:
        '201':
          description: Pallet creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PalletType'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Listar tipos de pallet
      responses:
        '200':
          description: Lista de pallet types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PalletType'
  /pallets/{palletTypeId}:
    get:
      summary: Detalle de tipo de pallet
      parameters:
        - in: path
          name: palletTypeId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pallet type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PalletType'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Eliminar un tipo de pallet
      parameters:
        - in: path
          name: palletTypeId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Eliminado (sin contenido)
        '404':
          $ref: '#/components/responses/NotFound'
  /zones:
    post:
      summary: Crear zona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneCreate'
      responses:
        '201':
          description: Zona creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Listar zonas
      responses:
        '200':
          description: Lista de zonas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Zone'
  /zones/{zoneId}:
    get:
      summary: Detalle de zona
      parameters:
        - in: path
          name: zoneId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Zona
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        '404':
          $ref: '#/components/responses/NotFound'
  /rates/compareByPostalCode:
    post:
      summary: Comparar tarifas por código postal y país
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateCompareByPostalCodeRequest'
      responses:
        '200':
          description: Resultados de comparación por agencia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateCompareResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /rates/compareByProvinceCode:
    post:
      summary: Comparar tarifas por código de provincia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateCompareByProvinceCodeRequest'
      responses:
        '200':
          description: Resultados de comparación por agencia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateCompareResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  responses:
    BadRequest:
      description: Petición inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Recurso duplicado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Error interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
    Agency:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum: [static, api, hybrid]
        active:
          type: boolean
        rules:
          type: object
          properties:
            hasAndaluciaRule:
              type: boolean
            supportsPallets:
              type: boolean
            supportsParcels:
              type: boolean
        supplements:
          type: object
        apiConfig:
          type: object
          properties:
            timeout:
              type: integer
            baseUrlApi:
              type: string
            endpoints:
              type: object
            apiKey:
              type: string
    AgencyCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [static, api, hybrid]
        rules:
          type: object
        apiConfig:
          type: object
    Location:
      type: object
      properties:
        _id:
          type: string
        countryCode:
          type: string
        countryName:
          type: string
        adminCode:
          type: string
        adminFullCode:
          type: string
        name:
          type: string
        normalizedName:
          type: string
        postalCode:
          type: string
        type:
          type: string
          enum: [province, country]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LocationCreate:
      type: object
      required: [countryCode, countryName, adminCode, name]
      properties:
        countryCode:
          type: string
          description: Código país (2 letras)
        countryName:
          type: string
        adminCode:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [province, state, region]
    PalletType:
      type: object
      properties:
        id:
          type: string
        agencyId:
          type: string
        name:
          type: string
        constraints:
          type: object
          properties:
            maxWeight:
              type: number
            maxHeight:
              type: number
            maxLength:
              type: number
            maxWidth:
              type: number
    PalletCreate:
      type: object
      required: [agencyId, name, constraints]
      properties:
        agencyId:
          type: string
        name:
          type: string
        constraints:
          type: object
          properties:
            maxWeight:
              type: number
            maxHeight:
              type: number
            maxLength:
              type: number
            maxWidth:
              type: number
    Zone:
      type: object
      properties:
        id:
          type: string
        agencyId:
          type: string
        name:
          type: string
        provinces:
          type: array
          items:
            type: string
        calculationMode:
          type: string
          enum: [pallet, parcel]
        postalCodeExceptions:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              zoneName:
                type: string
    ZoneCreate:
      type: object
      required: [agencyId, name]
      properties:
        agencyId:
          type: string
        name:
          type: string
        provinces:
          type: array
          items:
            type: string
        calculationMode:
          type: string
          enum: [pallet, parcel]
        postalCodeExceptions:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              zoneName:
                type: string
    RateCompareItem:
      type: object
      properties:
        type:
          type: string
          description: 'Tipo de artículo: "pallet" o "parcel"'
          enum: [pallet, parcel]
        weight:
          type: number
          description: Peso en kg
        length:
          type: number
          description: Largo en cm (para pallet)
        width:
          type: number
          description: Ancho en cm (para pallet)
        height:
          type: number
          description: Alto en cm (para pallet)
        quantity:
          type: integer
          description: Cantidad (default 1)
      required: [type, weight]
    RateCompareByPostalCodeRequest:
      type: object
      required: [destinationPostalCode, countryCode, items]
      properties:
        destinationPostalCode:
          type: string
          description: Código postal destino
        countryCode:
          type: string
          description: Código de país (ISO-2, ej ES, FR)
        items:
          type: array
          items:
            $ref: '#/components/schemas/RateCompareItem'
    RateCompareByProvinceCodeRequest:
      type: object
      required: [destinationPostalCode, province, items]
      properties:
        destinationPostalCode:
          type: string
          description: Código postal destino
        province:
          type: string
          description: Código de provincia (ej ES-M, ES-GR)
        items:
          type: array
          items:
            $ref: '#/components/schemas/RateCompareItem'
    RateService:
      type: object
      properties:
        serviceName:
          type: string
        basePrice:
          type: number
        surcharges:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              amount:
                type: number
        totalPrice:
          type: number
        currency:
          type: string
        deliveryDays:
          type: integer
    RateCompareResponse:
      type: object
      properties:
        scope:
          type: string
          enum: [national, international]
        destinationPostalCode:
          type: string
        countryCode:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              agency:
                type: string
              zone:
                type: string
              services:
                type: array
                items:
                  $ref: '#/components/schemas/RateService'
        errors:
          type: array
          items:
            type: object
            properties:
              agency:
                type: string
              error:
                type: string
              code:
                type: string
  securitySchemes: {}
